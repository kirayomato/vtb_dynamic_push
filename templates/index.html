<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VTB Dynamic</title>
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <style>
        :root {
            --bg-primary: #1E1E1E;
            --bg-secondary: #2D2D2D;
            --bg-tertiary: #3C3C3C;
            --border: #444;
            --text-primary: white;
            --text-secondary: #888;
            --accent: #4A9EFF;
        }

        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            /* 禁止外部滚动 */
        }

        body {
            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: Consolas, Monaco, monospace;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: var(--bg-secondary);
            padding: 10px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            flex-shrink: 0;
            /* 防止header被压缩 */
        }

        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        select,
        input,
        button {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 5px 10px;
            border-radius: 3px;
        }

        button:hover {
            background: #5A5A5A;
            cursor: pointer;
        }

        .log-container {
            flex: 1;
            /* 填充剩余空间 */
            overflow-y: auto;
            padding: 10px;
            min-height: 0;
            /* 重要：允许flex子项收缩 */
        }

        .log-entry {
            margin: 2px 0;
            padding: 2px 5px;
            border-radius: 2px;
            font-size: 18px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .log-entry:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .log-level {
            display: inline-block;
            width: 70px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .log-time {
            color: var(--text-secondary);
            margin-right: 10px;
        }

        .log-message {
            margin-left: 10px;
            white-space: pre-wrap;
            word-break: break-word;
        }

        .log-url {
            color: var(--accent);
            text-decoration: underline;
            cursor: pointer;
        }

        .log-url:hover {
            color: #6BB6FF;
        }

        .stats {
            font-size: 12px;
            color: #AAA;
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
        }

        /* 配置编辑器样式 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            padding: 20px;
            overflow-y: auto;
        }

        .modal.active {
            display: block;
        }

        .modal-content {
            background: var(--bg-secondary);
            border-radius: 5px;
            max-width: 900px;
            margin: 20px auto;
            border: 1px solid var(--border);
        }

        .modal-header {
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-body {
            padding: 20px;
            max-height: 70vh;
            overflow-y: auto;
        }

        .config-section {
            margin-bottom: 20px;
        }

        .config-section h3 {
            margin: 0 0 10px 0;
            color: var(--accent);
        }

        .config-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }

        .config-row label {
            width: 180px;
            flex-shrink: 0;
            font-size: 16px;
        }

        .config-row input,
        .config-row select {
            flex: 1;
            font-size: 16px;
        }

        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-secondary);
        }

        ::-webkit-scrollbar-thumb {
            background: #555;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #666;
        }

        /* 列表配置样式 */
        .list-config {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .list-items {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }

        .list-item {
            display: flex;
            gap: 3px;
            align-items: center;
            background: var(--bg-tertiary);
            padding: 3px 5px;
            border-radius: 3px;
            border: 1px solid var(--border);
        }

        .list-item-input {
            background: transparent;
            color: var(--text-primary);
            border: none;
            padding: 2px 5px;
            width: auto;
            min-width: 30px;
            max-width: 100px;
        }

        .list-item-input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
        }

        .list-item-remove {
            background: transparent;
            color: #d32f2f;
            border: none;
            width: 20px;
            height: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            padding: 0;
        }

        .list-item-remove:hover {
            color: #f44336;
            background: rgba(211, 47, 47, 0.2);
            border-radius: 2px;
        }

        .list-item-name {
            color: rgb(255 245 11);
            font-size: 16px;
            padding: 2px 8px;
            background: transparent;
            border-radius: 3px;
            white-space: nowrap;
        }

        .list-item-add {
            background: transparent;
            color: #4caf50;
            border: 1px dashed #4caf50;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            align-self: flex-start;
        }

        .list-item-add:hover {
            background: rgba(76, 175, 80, 0.1);
        }
    </style>
</head>

<body>
    <div class="header">
        <h1>VTB Dynamic</h1>
        <div class="controls">
            <div class="filter-group">
                <label>级别:</label>
                <select id="levelFilter">
                    <option value="">全部</option>
                    <option value="ERROR">错误</option>
                    <option value="WARNING">警告</option>
                    <option value="INFO">信息</option>
                    <option value="DEBUG">调试</option>
                </select>
            </div>
            <div class="filter-group">
                <label>搜索:</label>
                <input type="text" id="searchInput" placeholder="搜索日志内容...">
            </div>
            <div class="filter-group">
                <label>字体:</label>
                <select id="fontSize">
                    <option value="12px">12px</option>
                    <option value="16px">16px</option>
                    <option value="16px">16px</option>
                    <option value="18px" selected>18px</option>
                    <option value="20px">20px</option>
                    <option value="24px">24px</option>
                </select>
            </div>
            <button onclick="openConfigEditor()">编辑配置</button>
            <button onclick="updateCookies('weibo')">更新微博Cookies</button>
            <button onclick="updateCookies('bili')">更新B站Cookies</button>
            <div class="stats"><span id="logCount">0 条日志</span></div>
        </div>
    </div>
    <div class="log-container" id="logContainer">
        <div class="loading">正在加载日志...</div>
    </div>

    <!-- 配置编辑器弹窗 -->
    <div class="modal" id="configModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>编辑配置</h2>
                <button onclick="closeConfigEditor()">×</button>
            </div>
            <div class="modal-body" id="configForm">
                <div class="loading">加载中...</div>
            </div>
            <div class="modal-footer">
                <button onclick="saveConfig()">保存</button>
                <button onclick="closeConfigEditor()">取消</button>
            </div>
        </div>
    </div>

    <script>
        const state = {
            latestId: 0,
            oldestId: null,
            loading: false,
            hasMore: true
        };
        const $ = id => document.getElementById(id);
        const container = $('logContainer');

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadLogs('/logs/latest?limit=50', false);
            setInterval(() => loadLogs(`/logs?since_id=${state.latestId}`, true), 1000);

            container.addEventListener('scroll', () => {
                const nearBottom = container.scrollTop + container.clientHeight >= container.scrollHeight - 100;
                if (nearBottom && !state.loading && state.hasMore) loadHistory();
            });

            $('levelFilter').addEventListener('change', filterLogs);
            $('searchInput').addEventListener('input', filterLogs);
            $('fontSize').addEventListener('change', updateFontSize);

            const saved = localStorage.getItem('logFontSize');
            if (saved) { $('fontSize').value = saved; updateFontSize(); }
        });

        // 加载日志
        async function loadLogs(url, prepend) {
            try {
                const { logs } = await fetch(url).then(r => r.json());
                if (!logs?.length) return;

                if (container.querySelector('.loading')) container.innerHTML = '';

                const sorted = [...logs].sort((a, b) => b.id - a.id);
                sorted.forEach(log => addLog(log, prepend));

                state.latestId = Math.max(state.latestId, ...logs.map(l => l.id));
                if (!prepend && logs.length) state.oldestId = Math.min(...logs.map(l => l.id));

                updateCount();
                if (!prepend) container.scrollTop = 0;
            } catch (e) { console.error(e); }
        }

        // 加载历史
        async function loadHistory() {
            if (state.loading || !state.hasMore || state.oldestId === null) return;
            state.loading = true;
            showLoading(true);

            try {
                const { logs, has_more, oldest_id } = await fetch(`/logs/history?before_id=${state.oldestId}&limit=25`).then(r => r.json());
                logs?.forEach(log => addLog(log, false));
                state.hasMore = has_more;
                state.oldestId = oldest_id;
                updateCount();
            } catch (e) { console.error(e); }

            state.loading = false;
            showLoading(false);
        }

        // HTML转义函数
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // 添加日志条目
        function addLog(log, prepend = true) {
            const div = document.createElement('div');
            div.className = 'log-entry';
            div.dataset.logId = log.id;
            div.dataset.level = log.level;
            div.style.cssText = `color: ${log.color}; font-size: ${$('fontSize').value}`;

            const time = new Date(log.timestamp).toLocaleTimeString();
            let msg = escapeHtml(log.message); // 转义HTML内容
            if (log.urls && log.urls.length > 0) {
                // 替换所有的URL为链接
                log.urls.forEach(url => {
                    msg = msg.replace(`url: ${url}`, `url: <a href="${url}" target="_blank" class="log-url">${url}</a>`);
                });
            }

            div.innerHTML = `
                <span class="log-time">${time}</span>
                <span class="log-level" style="color:${log.color}">${log.level}</span>
                <span class="log-message">${msg}</span>`;

            const loading = $('historyLoading');
            prepend ? container.insertBefore(div, container.firstChild)
                : loading ? container.insertBefore(div, loading) : container.appendChild(div);

            // 限制数量
            const entries = container.querySelectorAll('.log-entry');
            if (entries.length > 1000) entries[prepend ? entries.length - 1 : 0].remove();
        }

        // 显示/隐藏加载指示
        function showLoading(show) {
            let el = $('historyLoading');
            if (show && !el) {
                el = document.createElement('div');
                el.id = 'historyLoading';
                el.className = 'loading';
                el.textContent = '正在加载历史日志...';
                container.appendChild(el);
            } else if (!show && el) el.remove();
        }

        // 过滤日志
        function filterLogs() {
            const level = $('levelFilter').value;
            const search = $('searchInput').value.toLowerCase();
            container.querySelectorAll('.log-entry').forEach(log => {
                const match = (!level || log.dataset.level === level) &&
                    (!search || log.textContent.toLowerCase().includes(search));
                log.style.display = match ? 'block' : 'none';
            });
        }

        // 更新字体
        function updateFontSize() {
            const size = $('fontSize').value;
            container.querySelectorAll('.log-entry').forEach(el => el.style.fontSize = size);
            localStorage.setItem('logFontSize', size);
        }

        // 更新计数
        function updateCount() {
            $('logCount').textContent = `${container.querySelectorAll('.log-entry').length} 条日志`;
        }

        // 更新Cookies
        async function updateCookies(type) {
            const name = type === 'weibo' ? '微博' : 'B站';
            const content = prompt(`请输入新的${name}Cookies:`);
            if (!content) return;
            try {
                const { message, error } = await fetch(`/write-${type}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain' },
                    body: content
                }).then(r => r.json());
                alert(message || error);
            } catch (e) { alert('错误: ' + e); }
        }

        // 打开配置编辑器
        async function openConfigEditor() {
            const modal = $('configModal');
            modal.classList.add('active');
            await loadConfig();
        }

        // 关闭配置编辑器
        function closeConfigEditor() {
            $('configModal').classList.remove('active');
        }

        // 检查是否是逗号分隔的列表配置
        function isListConfig(key, value) {
            return value.includes(',') || key.includes('list');
        }

        // 获取B站用户名
        async function fetchBiliUserNames(uids) {
            try {
                const response = await fetch(`/user_info/bili/batch?uids=${uids.join(',')}`);
                return await response.json();
            } catch (e) {
                console.error('获取B站用户名失败:', e);
                return {};
            }
        }

        // 获取微博用户名
        async function fetchWeiboUserNames(uids) {
            try {
                const response = await fetch(`/user_info/weibo/batch?uids=${uids.join(',')}`);
                return await response.json();
            } catch (e) {
                console.error('获取微博用户名失败:', e);
                return {};
            }
        }

        // 加载配置
        async function loadConfig() {
            try {
                const { config, error } = await fetch('/config').then(r => r.json());
                if (error) { alert(error); return; }

                // 收集所有B站UID
                const biliUids = [];
                const biliUidKeys = ['dynamic_uid_list', 'live_uid_list', 'special_list'];
                for (const [section, options] of Object.entries(config)) {
                    for (const [key, value] of Object.entries(options)) {
                        if (biliUidKeys.includes(key) && value) {
                            value.split(',').forEach(uid => {
                                uid = uid.trim();
                                if (uid && !biliUids.includes(uid)) {
                                    biliUids.push(uid);
                                }
                            });
                        }
                    }
                }

                // 收集所有微博UID
                const weiboUids = [];
                for (const [section, options] of Object.entries(config)) {
                    if (section === 'weibo' && options.uid_list) {
                        options.uid_list.split(',').forEach(uid => {
                            uid = uid.trim();
                            if (uid && !weiboUids.includes(uid)) {
                                weiboUids.push(uid);
                            }
                        });
                    }
                }

                // 获取用户名
                const biliUserNamesMap = biliUids.length > 0 ? await fetchBiliUserNames(biliUids) : {};
                const weiboUserNamesMap = weiboUids.length > 0 ? await fetchWeiboUserNames(weiboUids) : {};

                let html = '';
                for (const [section, options] of Object.entries(config)) {
                    html += `<div class="config-section"><h3>[${section}]</h3>`;
                    for (const [key, value] of Object.entries(options)) {
                        const inputType = key.includes('enable') ? 'select' : 'input';
                        if (inputType === 'select') {
                            html += `<div class="config-row">
                                <label>${key}:</label>
                                <select data-section="${section}" data-key="${key}">
                                    <option value="true" ${value === 'true' ? 'selected' : ''}>true</option>
                                    <option value="false" ${value === 'false' ? 'selected' : ''}>false</option>
                                </select>
                            </div>`;
                        } else if (isListConfig(key, value)) {
                            // 逗号分隔的列表配置
                            const items = value.split(',').map(item => item.trim()).filter(item => item);
                            const isBiliUid = section === 'bili';
                            const isWeiboUid = section === 'weibo';
                            html += `<div class="config-row">
                                <label>${key}:</label>
                                <div class="list-config" data-section="${section}" data-key="${key}">
                                    <div class="list-items">`;
                            items.forEach((item) => {
                                let displayName = '';
                                if (isBiliUid && biliUserNamesMap[item]) {
                                    displayName = `<span class="list-item-name">${escapeHtml(biliUserNamesMap[item])}</span>`;
                                } else if (isWeiboUid && weiboUserNamesMap[item]) {
                                    displayName = `<span class="list-item-name">${escapeHtml(weiboUserNamesMap[item])}</span>`;
                                }
                                html += `<div class="list-item">
                                    <input type="text" value="${escapeHtml(item)}" class="list-item-input">
                                    ${displayName}
                                    <button class="list-item-remove" onclick="removeListItem(this)">×</button>
                                </div>`;
                            });
                            html += `</div>
                                    <button class="list-item-add" onclick="addListItem(this)">+ 添加</button>
                                </div>
                            </div>`;
                        } else {
                            html += `<div class="config-row">
                                <label>${key}:</label>
                                <input type="text" data-section="${section}" data-key="${key}" value="${escapeHtml(value)}">
                            </div>`;
                        }
                    }
                    html += '</div>';
                }
                $('configForm').innerHTML = html;
            } catch (e) { alert('加载配置失败: ' + e); }
        }

        // 添加列表项
        function addListItem(btn) {
            const listContainer = btn.previousElementSibling;
            const section = btn.closest('.list-config').dataset.section;
            const key = btn.closest('.list-config').dataset.key;
            const newItem = document.createElement('div');
            newItem.className = 'list-item';
            newItem.innerHTML = `
                <input type="text" value="" class="list-item-input">
                <button class="list-item-remove" onclick="removeListItem(this)">×</button>
            `;
            listContainer.appendChild(newItem);
        }

        // 删除列表项
        function removeListItem(btn) {
            btn.parentElement.remove();
        }

        // 保存配置
        async function saveConfig() {
            const formData = {};
            document.querySelectorAll('[data-section]').forEach(el => {
                const section = el.dataset.section;
                const key = el.dataset.key;
                let value = el.value;

                if (!formData[section]) formData[section] = {};

                // 处理列表配置
                if (el.classList.contains('list-config')) {
                    const inputs = el.querySelectorAll('.list-item-input');
                    value = Array.from(inputs)
                        .map(input => input.value.trim())
                        .filter(item => item)
                        .join(',');
                }

                formData[section][key] = value;
            });

            try {
                const { message, error } = await fetch('/config', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData)
                }).then(r => r.json());

                if (error) alert(error);
                else {
                    alert(message);
                    closeConfigEditor();
                }
            } catch (e) { alert('保存失败: ' + e); }
        }
    </script>
</body>

</html>
